<html>

<head>
    <title>Liste des utilisateurs</title>
</head>

<body>
    <h1>Utilisateurs</h1>
    <a href="/utilisateurs/create">Ajouter</a>
    <ul>
        {% for user in users %}

        <li>
            <a href="/utilisateurs/{{ user.id }}">
                {{user.id}}
                {{ user.first_name }}
                {{ user.last_name }}
                {{ user.email}}
                {{ user.password }}
                {{ user.phone }}
                {{ user.address }}
                {{ user.role }}
            </a>
        </li>

        {% endfor %}
    </ul>
</body>

</html>
