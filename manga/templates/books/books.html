<html>

<head>
    <title>Livres</title>
</head>

<body>
    <h1>Liste des livres:</h1>
    <ul>

        {% for livre in livres %}
        <li>

            <a href="/books/{{ livre.id }}">

                {{ livre.id }}
                {{ livre.name }}
                {{ livre.author_name }}
            </a>
        </li>
        {% endfor %}
    </ul>
</body>

</html>
