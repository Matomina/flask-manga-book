<!DOCTYPE html>
<html>

<head>
    <title>Modifier article</title>
</head>

<body>

    <h1>Modifier article</h1>

    <form method="POST">

        <label>Nom :</label><br>
        <input type="text" name="name" value="{{ article['name'] }}" required><br><br>

        <label>Genre :</label><br>
        <input type="text" name="genres" value="{{ article['genres'] }}" required><br><br>

        <label>Image :</label><br>
        <input type="text" name="image" value="{{ article['image'] }}" required><br><br>

        <label>Prix :</label><br>
        <input type="number" step="0.01" name="price" value="{{ article['price'] }}" required><br><br>

        <label>Stock :</label><br>
        <input type="number" name="stock" value="{{ article['stock'] }}" required><br><br>

        <button type="submit">Mettre à jour</button>

    </form>

    <p>
        <a href="{{ url_for('articles.detail_article', id=article['id']) }}">
            ← Retour
        </a>
    </p>

</body>

</html>
