<!DOCTYPE html>
<html>

<head>
    <title>Liste des utilisateurs</title>
</head>

<body>

    <h1>Utilisateurs</h1>

    <a href="{{ url_for('users.create') }}">Ajouter un utilisateur</a>

    <ul>
        {% for user in users %}
        <li>
            <a href="{{ url_for('users.detail_user', id=user['id']) }}">
                {{ user['id'] }} -
                {{ user['first_name'] }}
                {{ user['last_name'] }} |
                {{ user['email'] }} |
                {{ user['role'] }}
            </a>
        </li>
        {% endfor %}
    </ul>

</body>

</html>
