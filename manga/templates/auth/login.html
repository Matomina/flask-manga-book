<!DOCTYPE html>
<html>

<head>
    <title>Connexion</title>
</head>

<body>

    <h1>Connexion</h1>

    <form method="POST">

        <div>
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div>
            <label>Mot de passe</label>
            <input type="password" name="password" required>
        </div>

        <br>

        <input type="submit" value="Se connecter">

    </form>

    <p>
        Pas encore inscrit ?
        <a href="{{ url_for('auth.register') }}">
            Créer un compte
        </a>
    </p>

</body>

</html>
