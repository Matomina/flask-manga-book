{% extends "base.html" %}

{% block title %}Créer un article{% endblock %}

{% block content %}

<h1>Créer un article</h1>

<form method="POST" action="{{ url_for('admin_articles.create_article') }}">

    <div>
        <label>Nom :</label><br>
        <input type="text" name="name" required>
    </div>

    <br>

    <div>
        <label>Genre :</label><br>
        <input type="text" name="genres" required>
    </div>

    <br>

    <div>
        <label>Image (chemin) :</label><br>
        <input type="text" name="image" placeholder="images/manga1.jpg" required>
    </div>

    <br>

    <div>
        <label>Prix :</label><br>
        <input type="number" step="0.01" name="price" required>
    </div>

    <br>

    <div>
        <label>Stock :</label><br>
        <input type="number" name="stock" required>
    </div>

    <br>

    <button type="submit">
        Créer
    </button>

</form>

<p>
    <a href="{{ url_for('admin_articles.list_articles') }}">
        ← Retour
    </a>
</p>

{% endblock %}
