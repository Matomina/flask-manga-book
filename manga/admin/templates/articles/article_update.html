{% extends "admin_layout.html" %}

{% block title %}Modifier article{% endblock %}

{% block content %}

<h1>Modifier article</h1>

{% if article %}

<form method="POST" action="{{ url_for('admin_articles.update_article', id=article['id']) }}">

    <div>
        <label>Nom :</label><br>
        <input type="text" name="name" value="{{ article['name'] }}" required>
    </div>

    <br>

    <div>
        <label>Genre :</label><br>
        <input type="text" name="genres" value="{{ article['genres'] }}" required>
    </div>

    <br>

    <div>
        <label>Image :</label><br>
        <input type="text" name="image" value="{{ article['image'] }}" required>
    </div>

    <br>

    <div>
        <label>Prix :</label><br>
        <input type="number" step="0.01" name="price" value="{{ article['price'] }}" required>
    </div>

    <br>

    <div>
        <label>Stock :</label><br>
        <input type="number" name="stock" value="{{ article['stock'] }}" required>
    </div>

    <br>

    <button type="submit">
        Mettre à jour
    </button>

</form>

<p>
    <a href="{{ url_for('admin_articles.detail_article', id=article['id']) }}">
        ← Retour
    </a>
</p>

{% else %}

<p>Article introuvable.</p>

{% endif %}

{% endblock %}
