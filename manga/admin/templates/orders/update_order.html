{% extends "admin_layout.html" %}

{% block title %}Modifier commande{% endblock %}

{% block content %}

<h1>Modifier commande</h1>

<p>
    <a href="{{ url_for('admin_orders.list_orders') }}">
        ← Retour à la liste
    </a>
</p>

{% if order %}

<form method="POST" action="{{ url_for('admin_orders.update_order', id=order['id']) }}">

    <div>
        <label>User ID</label>
        <input type="number" name="user_id" value="{{ order['user_id'] }}" required>
    </div>

    <div>
        <label>Total (€)</label>
        <input type="number" step="0.01" name="total_amount" value="{{ order['total_amount'] }}" required>
    </div>

    <div>
        <label>Statut</label>
        <select name="status">

            <option value="pending" {% if order['status']=='pending' %}selected{% endif %}>
                Pending
            </option>

            <option value="paid" {% if order['status']=='paid' %}selected{% endif %}>
                Paid
            </option>

            <option value="shipped" {% if order['status']=='shipped' %}selected{% endif %}>
                Shipped
            </option>

            <option value="delivered" {% if order['status']=='delivered' %}selected{% endif %}>
                Delivered
            </option>

            <option value="cancelled" {% if order['status']=='cancelled' %}selected{% endif %}>
                Cancelled
            </option>

        </select>
    </div>

    <br>

    <button type="submit">
        Sauvegarder
    </button>

</form>

<br>

<form method="POST" action="{{ url_for('admin_orders.delete_order', id=order['id']) }}">
    <button type="submit" onclick="return confirm('Confirmer la suppression ?')">
        Supprimer cette commande
    </button>
</form>

{% else %}

<p>Commande introuvable.</p>

{% endif %}

{% endblock %}
